<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>一张照片</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, -apple-system, sans-serif;
      --bg: #0d0e0d;
      --ink: #f4efe8;
      --muted: rgba(244, 239, 232, .66);
      --soft: rgba(244, 239, 232, .12);
      --line: rgba(244, 239, 232, .24);
      --paper: #191714;
      --accent: #d7b98c;
      --hold: 0%;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--ink);
      background: var(--bg);
    }

    body::before {
      content: "";
      position: fixed;
      inset: -26px;
      z-index: -2;
      background: url("./photo-original.jpg") center / cover no-repeat;
      filter: blur(28px) saturate(.78) brightness(.52);
      opacity: .32;
      transform: scale(1.04);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(90deg, rgba(13, 14, 13, .94), rgba(13, 14, 13, .62) 48%, rgba(13, 14, 13, .90)),
        linear-gradient(180deg, rgba(13, 14, 13, .88), rgba(13, 14, 13, .28) 48%, rgba(13, 14, 13, .90));
      pointer-events: none;
    }

    .scene {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(260px, 420px) minmax(280px, 480px);
      gap: clamp(28px, 6vw, 82px);
      align-items: center;
      justify-content: center;
      padding: clamp(24px, 6vw, 72px);
      --photo-tilt-x: 0deg;
      --photo-tilt-y: 0deg;
      --photo-shift-x: 0px;
      --photo-shift-y: 0px;
    }

    .copy {
      align-self: center;
      display: grid;
      gap: 18px;
      min-width: 0;
      max-width: 390px;
    }

    .date {
      margin: 0;
      color: var(--accent);
      font-size: 13px;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 10em;
      font-size: clamp(34px, 4.9vw, 62px);
      line-height: 1.06;
      font-weight: 500;
      letter-spacing: 0;
    }

    .copy p:not(.date) {
      margin: 0;
      color: var(--muted);
      font-size: clamp(16px, 1.7vw, 19px);
      line-height: 1.8;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      color: var(--ink);
      background: rgba(244, 239, 232, .08);
      font: inherit;
      cursor: pointer;
      transition: border-color .25s ease, background .25s ease, transform .25s ease;
    }

    button:focus-visible {
      outline: 2px solid rgba(215, 185, 140, .72);
      outline-offset: 4px;
    }

    .hold {
      position: relative;
      min-width: 148px;
      height: 46px;
      overflow: hidden;
      border-radius: 999px;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 600;
    }

    .hold::before {
      content: "";
      position: absolute;
      inset: 0;
      width: var(--hold);
      background: rgba(215, 185, 140, .22);
      transition: width .08s linear;
    }

    .hold span {
      position: relative;
      z-index: 1;
    }

    .ghost {
      height: 46px;
      border-radius: 999px;
      padding: 0 16px;
      color: var(--muted);
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
    }

    .scene.is-open .ghost {
      opacity: 1;
      pointer-events: auto;
    }

    button:hover {
      border-color: rgba(215, 185, 140, .62);
      background: rgba(244, 239, 232, .12);
      transform: translateY(-1px);
    }

    .frame-area {
      width: 100%;
      max-width: 420px;
      min-width: 0;
      display: grid;
      justify-items: center;
      gap: 16px;
    }

    .memory-frame {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 3 / 4;
      margin: 0;
      overflow: hidden;
      border: 1px solid rgba(244, 239, 232, .22);
      border-radius: 8px;
      background: #15130f;
      box-shadow: 0 34px 90px rgba(0, 0, 0, .48);
      isolation: isolate;
      transform: perspective(1100px) rotateX(var(--photo-tilt-x)) rotateY(var(--photo-tilt-y)) translate3d(var(--photo-shift-x), var(--photo-shift-y), 0);
      transform-style: preserve-3d;
      transition: transform .45s ease, box-shadow .7s ease, border-color .7s ease;
      will-change: transform;
    }

    .scene.is-open .memory-frame {
      border-color: rgba(244, 239, 232, .30);
      box-shadow:
        0 38px 96px rgba(0, 0, 0, .54),
        0 0 44px rgba(215, 185, 140, .10);
      animation: frame-breath 6.8s ease-in-out infinite;
    }

    .memory-frame::before,
    .memory-frame::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .memory-frame::before {
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(255, 247, 231, .11), transparent 22%, transparent 72%, rgba(12, 10, 8, .34)),
        radial-gradient(ellipse at 50% 8%, rgba(255, 228, 184, .16), transparent 42%);
      opacity: .34;
      transition: opacity 1.2s ease;
    }

    .scene.is-open .memory-frame::before {
      opacity: .48;
      animation: memory-warmth 7.4s ease-in-out infinite;
    }

    .memory-frame::after {
      inset: -22% -48%;
      z-index: 6;
      background: linear-gradient(112deg, transparent 34%, rgba(255, 245, 222, .18) 47%, rgba(255, 245, 222, .05) 52%, transparent 66%);
      opacity: 0;
      transform: translateX(-44%);
    }

    .scene.is-open .memory-frame::after {
      animation: slow-sheen 8.8s 1.4s ease-in-out infinite;
    }

    .photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: 50% 50%;
      filter: saturate(.88) contrast(.94) brightness(.7) blur(7px);
      transform: scale(1.06);
      transition: filter 1.8s cubic-bezier(.22, 1, .36, 1), transform 1.8s cubic-bezier(.22, 1, .36, 1);
    }

    .scene.is-open .photo {
      filter: saturate(1.02) contrast(1.01) brightness(1) blur(0);
      transform: scale(1);
      animation: photo-drift 13s 1.1s ease-in-out infinite alternate;
    }

    .sleeve {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        linear-gradient(135deg, rgba(247, 241, 230, .10), rgba(247, 241, 230, .02)),
        linear-gradient(180deg, rgba(13, 14, 13, .92), rgba(20, 18, 15, .78));
      backdrop-filter: blur(12px);
      transform-origin: 50% 0;
      transition: transform 1.35s cubic-bezier(.22, 1, .36, 1), opacity 1.1s ease;
    }

    .scene.is-open .sleeve {
      transform: translateY(-102%);
      opacity: .08;
    }

    .sleeve-note {
      width: 100%;
      min-height: 70%;
      display: grid;
      align-content: end;
      gap: 16px;
      padding: 26px;
      border: 1px solid rgba(244, 239, 232, .18);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(244, 239, 232, .08), rgba(244, 239, 232, .03)),
        repeating-linear-gradient(90deg, rgba(255,255,255,.025) 0 1px, transparent 1px 5px);
    }

    .sleeve-note strong {
      display: block;
      max-width: 11em;
      font-size: clamp(24px, 3.1vw, 34px);
      line-height: 1.28;
      font-weight: 500;
      letter-spacing: 0;
    }

    .sleeve-note small {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .shutter {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .shutter::before,
    .shutter::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 50.2%;
      background: rgba(13, 14, 13, .62);
      transition: transform 1.45s cubic-bezier(.22, 1, .36, 1);
    }

    .shutter::before {
      left: 0;
      border-right: 1px solid rgba(244, 239, 232, .16);
    }

    .shutter::after {
      right: 0;
      border-left: 1px solid rgba(244, 239, 232, .16);
    }

    .scene.is-open .shutter::before {
      transform: translateX(-101%);
    }

    .scene.is-open .shutter::after {
      transform: translateX(101%);
    }

    .light-pass {
      position: absolute;
      inset: -15% -45%;
      z-index: 4;
      background: linear-gradient(105deg, transparent 34%, rgba(255, 245, 224, .30) 48%, transparent 62%);
      transform: translateX(-75%);
      opacity: 0;
      pointer-events: none;
    }

    .scene.is-open .light-pass {
      animation: expose 1.8s .18s cubic-bezier(.22, 1, .36, 1) forwards;
    }

    .grain {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      opacity: .12;
      mix-blend-mode: soft-light;
      background-image:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,.28) 0 1px, transparent 1px),
        radial-gradient(circle at 76% 44%, rgba(255,255,255,.20) 0 1px, transparent 1px);
      background-size: 8px 9px, 11px 13px;
    }

    .scene.is-open .grain {
      animation: film-grain 1.8s steps(2, end) infinite;
    }

    .caption-line {
      width: 100%;
      max-width: 420px;
      margin: 0;
      color: rgba(244, 239, 232, .68);
      font-size: 14px;
      line-height: 1.75;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .85s .85s ease, transform .85s .85s ease;
    }

    .scene.is-open .caption-line {
      opacity: 1;
      transform: translateY(0);
    }

    .sound {
      min-height: 22px;
      color: rgba(244, 239, 232, .56);
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
    }

    @keyframes expose {
      0% {
        opacity: 0;
        transform: translateX(-75%);
      }
      22% {
        opacity: .8;
      }
      100% {
        opacity: 0;
        transform: translateX(75%);
      }
    }

    @keyframes frame-breath {
      0%, 100% {
        box-shadow:
          0 38px 96px rgba(0, 0, 0, .54),
          0 0 38px rgba(215, 185, 140, .08);
      }
      50% {
        box-shadow:
          0 42px 106px rgba(0, 0, 0, .58),
          0 0 58px rgba(215, 185, 140, .16);
      }
    }

    @keyframes memory-warmth {
      0%, 100% {
        opacity: .42;
      }
      50% {
        opacity: .58;
      }
    }

    @keyframes slow-sheen {
      0%, 68% {
        opacity: 0;
        transform: translateX(-44%);
      }
      78% {
        opacity: .75;
      }
      100% {
        opacity: 0;
        transform: translateX(44%);
      }
    }

    @keyframes photo-drift {
      0% {
        transform: scale(1.004) translate3d(0, 0, 0);
      }
      100% {
        transform: scale(1.026) translate3d(-1.1%, -.7%, 0);
      }
    }

    @keyframes film-grain {
      0% {
        background-position: 0 0, 0 0;
      }
      100% {
        background-position: 7px -5px, -9px 6px;
      }
    }

    @media (max-width: 820px) {
      .scene {
        grid-template-columns: 1fr;
        gap: 24px;
        padding: 22px;
      }

      .copy {
        max-width: 330px;
        justify-self: start;
        align-self: end;
        padding-top: 10px;
      }

      .frame-area {
        width: 330px;
        max-width: calc(100vw - 44px);
        justify-self: start;
      }

      h1 {
        max-width: 10em;
        font-size: clamp(31px, 10vw, 46px);
      }

      .memory-frame {
        max-width: 100%;
      }

      .caption-line {
        max-width: 100%;
      }

      .controls {
        flex-wrap: wrap;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="scene" id="scene">
    <section class="copy" aria-label="给她的话">
      <p class="date">2026.05.20</p>
      <h1>有些瞬间，<br>不用说太满。</h1>
      <p>我只是想把这张照片，好好递给你。那天的风、天空和笑起来的样子，我都想认真保存。</p>
      <div class="controls">
        <button class="hold" id="openBtn" type="button" aria-label="按住打开照片">
          <span>按住打开</span>
        </button>
        <button class="ghost" id="resetBtn" type="button">收起再看</button>
      </div>
    </section>

    <section class="frame-area" aria-label="照片">
      <figure class="memory-frame">
        <img class="photo" src="./photo-original.jpg" alt="一起在蓝天下的合照" />
        <div class="shutter" aria-hidden="true"></div>
        <div class="sleeve" aria-hidden="true">
          <div class="sleeve-note">
            <strong>今天只想给你看这一秒。</strong>
            <small>不是模板，也不是热闹里的情话。只是我很喜欢的一张照片。</small>
          </div>
        </div>
        <div class="light-pass" aria-hidden="true"></div>
        <div class="grain" aria-hidden="true"></div>
      </figure>
      <p class="caption-line">那天风很好，天空也干净。后来我想起这张照片，觉得喜欢一个人也可以这么简单：看见你笑，就想把这一秒留久一点。</p>
      <div class="sound" id="soundText">音乐会在打开时轻轻进来。</div>
    </section>

    <audio id="audio" src="./midnight-drive-korean-pop.mp3" preload="auto"></audio>
  </main>

  <script>
    const scene = document.getElementById("scene");
    const openBtn = document.getElementById("openBtn");
    const resetBtn = document.getElementById("resetBtn");
    const audio = document.getElementById("audio");
    const soundText = document.getElementById("soundText");
    const frame = document.querySelector(".memory-frame");
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    let holdTimer = 0;
    let holdStart = 0;
    let isHolding = false;
    const holdMs = 1150;

    function setHold(value) {
      openBtn.style.setProperty("--hold", `${Math.max(0, Math.min(1, value)) * 100}%`);
    }

    function fadeAudio(target) {
      const start = audio.volume;
      const started = performance.now();
      const duration = 900;
      function tick(now) {
        const p = Math.min(1, (now - started) / duration);
        audio.volume = start + (target - start) * p;
        if (p < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    async function startMusic() {
      try {
        audio.volume = 0;
        if (audio.paused) {
          audio.currentTime = 0;
          await audio.play();
        }
        fadeAudio(0.42);
        soundText.textContent = "音乐已经开始。";
      } catch {
        soundText.textContent = "浏览器拦截了自动播放，再按一次就好。";
      }
    }

    function reveal() {
      if (scene.classList.contains("is-open")) return;
      isHolding = false;
      cancelAnimationFrame(holdTimer);
      setHold(1);
      scene.classList.add("is-open");
      openBtn.querySelector("span").textContent = "已经打开";
      openBtn.setAttribute("aria-label", "照片已经打开");
      openBtn.disabled = true;
      startMusic();
    }

    function loopHold(now) {
      if (!isHolding) return;
      const progress = (now - holdStart) / holdMs;
      setHold(progress);
      if (progress >= 1) {
        reveal();
        return;
      }
      holdTimer = requestAnimationFrame(loopHold);
    }

    function beginHold(event) {
      if (scene.classList.contains("is-open")) return;
      isHolding = true;
      holdStart = performance.now();
      setHold(0);
      openBtn.setPointerCapture?.(event.pointerId);
      startMusic();
      holdTimer = requestAnimationFrame(loopHold);
    }

    function cancelHold() {
      if (!isHolding) return;
      isHolding = false;
      cancelAnimationFrame(holdTimer);
      setHold(0);
      if (!scene.classList.contains("is-open")) {
        fadeAudio(0);
      }
    }

    openBtn.addEventListener("pointerdown", beginHold);
    openBtn.addEventListener("pointerup", cancelHold);
    openBtn.addEventListener("pointercancel", cancelHold);
    openBtn.addEventListener("pointerleave", cancelHold);

    if (!reduceMotion && frame) {
      frame.addEventListener("pointermove", (event) => {
        const rect = frame.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width - 0.5;
        const y = (event.clientY - rect.top) / rect.height - 0.5;
        scene.style.setProperty("--photo-tilt-x", `${(-y * 2.4).toFixed(2)}deg`);
        scene.style.setProperty("--photo-tilt-y", `${(x * 2.8).toFixed(2)}deg`);
        scene.style.setProperty("--photo-shift-x", `${(x * 4).toFixed(2)}px`);
        scene.style.setProperty("--photo-shift-y", `${(y * 4).toFixed(2)}px`);
      });

      frame.addEventListener("pointerleave", () => {
        scene.style.setProperty("--photo-tilt-x", "0deg");
        scene.style.setProperty("--photo-tilt-y", "0deg");
        scene.style.setProperty("--photo-shift-x", "0px");
        scene.style.setProperty("--photo-shift-y", "0px");
      });
    }

    resetBtn.addEventListener("click", () => {
      scene.classList.remove("is-open");
      openBtn.disabled = false;
      openBtn.querySelector("span").textContent = "按住打开";
      openBtn.setAttribute("aria-label", "按住打开照片");
      setHold(0);
      fadeAudio(0);
      soundText.textContent = "音乐会在打开时轻轻进来。";
      setTimeout(() => {
        if (!scene.classList.contains("is-open")) {
          audio.pause();
          audio.currentTime = 0;
        }
      }, 950);
    });

    if (new URLSearchParams(window.location.search).get("open") === "1") {
      scene.classList.add("is-open");
      openBtn.disabled = true;
      openBtn.querySelector("span").textContent = "已经打开";
      setHold(1);
      soundText.textContent = "音乐会在正式打开时轻轻进来。";
    }
  </script>
</body>
</html>
